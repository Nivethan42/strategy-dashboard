name: Update strategy data

on:
  workflow_dispatch:
  schedule:
    # Hourly refresh on weekdays.
    - cron: "10 * * * 1-5"
    # Additional 5-minute refreshes from 9:20am to 10:00am EDT (13:20 to 14:00 UTC during DST).
    - cron: "20,25,30,35,40,45,50,55 13 * * 1-5"
    - cron: "0 14 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run update script
        continue-on-error: true
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: python scripts/fetch_and_update.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/strategies/*.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update dashboard data"
            git push
          fi
