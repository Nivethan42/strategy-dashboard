name: Update strategy data

on:
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Bypass NYSE/time guard and run an immediate refresh"
        required: false
        type: boolean
        default: false
  schedule:
    # 9:35am, 9:40am, and 9:45am America/New_York during EDT.
    - cron: "35,40,45 13 * * 1-5"
    # 9:35am, 9:40am, and 9:45am America/New_York during EST.
    - cron: "35,40,45 14 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run update script
        continue-on-error: true
        env:
          GITHUB_SHA: ${{ github.sha }}
          FORCE_REFRESH: ${{ github.event_name == 'workflow_dispatch' && inputs.force_refresh && '1' || '' }}
        run: python scripts/fetch_and_update.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/strategies/*.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update dashboard data"
            git push
          fi
